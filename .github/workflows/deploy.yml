name: Deploy to GitHub Pages

# Deploy เว็บ static (index.html + config.js) ขึ้น GitHub Pages อัตโนมัติ
# ทุกครั้งที่ push เข้า branch หลัก

on:
  push:
    branches:
      - main
  workflow_dispatch:        # กดรันเองได้จากแท็บ Actions

# สิทธิ์ที่ GitHub Pages ต้องใช้
permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง ไม่ทับซ้อน
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # อัปโหลดทั้งโฟลเดอร์ (เว็บ static อยู่ที่ root)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
