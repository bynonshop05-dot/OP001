document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#a59f92;font-family:'IBM Plex Mono'\">{{ m.model }}<\u002Fspan>\n                <span style=\"justify-self:start;font-size:11px;font-family:'IBM Plex Mono';padding:4px 10px;border-radius:6px;color:{{ m.statusColor }};background:{{ m.statusBg }}\">{{ m.status }}<\u002Fspan>\n                <button onclick=\"{{ m.onDelete }}\" title=\"ลบเครื่องจักร\" style=\"width:32px;height:32px;justify-self:center;border-radius:7px;border:1px solid #2b2720;background:#16140f;color:#a59f92;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#ef444418;border-color:#ef444455;color:#f87171\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18\"><\u002Fpath><path d=\"M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2\"><\u002Fpath><path d=\"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><path d=\"M10 11v6M14 11v6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"padding:13px 20px;font-size:11.5px;color:#736e63;font-family:'IBM Plex Mono'\">แสดง {{ machineCount }} จาก 325 เครื่อง<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ PM PLANS ============ -->\n      <sc-if value=\"{{ isPlans }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px\">\n          <sc-for list=\"{{ plans }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <div style=\"background:#211e18;border:1px solid #2b2720;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:14px;opacity:{{ p.cardOpacity }}\" style-hover=\"border-color:#3a352c\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n                <div style=\"display:fl ointer\" style-hover=\"background:#26221b\">{{ p.pauseLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ WORK ORDERS ============ -->\n      <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start\">\n          <sc-for list=\"{{ woColumns }}\" as=\"col\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:0 4px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ col.color }}\"><\u002Fspan>\n                <span style=\"font-size:12.5px;font-weight:600;color:#e8e2d6\">{{ col.th }}<\u002Fspan>\n                <span style=\"font-size:11px;font-family:'IBM Plex Mono';color:#736e63;background:#211e18;padding:2px 8px;border-radius:20px\">{{ col.count }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ col.items }}\" as=\"w\" hint-placeholder-count=\"2\">\n                <div onclick=\"{{ w.onOpen }}\" style=\"background:#211e18;border:1px solid #2b2720;border-left:3px solid {{ col.color }};border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;cursor:pointer\" style-hover=\"background:#26221b;border-color:#3a352c\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\">\n                    <span style=\"font-family:'IBM Plex Mono';font-size:11.5px;color:#f97316\">{{ w.id }}<\u002Fspan>\n                    <span style=\"font-size:9.5px;font-family:'IBM Plex Mono';padding:3px 7px;border-radius:5px;color:{{ w.prioColor }};background:{{ w.prioBg }}\">{{ w.priority }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"font-size:13px;color:#e8e2d6;font-weight:500;line-height:1.3\"> right:1px solid #211e18;border-bottom:1px solid #211e18;padding:7px 8px;display:flex;flex-direction:column;gap:5px;background:{{ d.bg }}\">\n                    <span style=\"font-size:12px;font-family:'IBM Plex Mono';color:{{ d.numColor }};font-weight:{{ d.numWeight }};align-self:flex-start;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:{{ d.numBg }}\">{{ d.day }}<\u002Fspan>\n                    <sc-for list=\"{{ d.events }}\" as=\"ev\" hint-placeholder-count=\"0\">\n                      <span style=\"font-size:9.5px;color:#e8e2d6;background:{{ ev.bg }};border-left:2px solid {{ ev.color }};padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'IBM Plex Mono'\">{{ ev.label }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ REPORTS ============ -->\n      <sc-if value=\"{{ isReports }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px\">\n          <sc-for list=\"{{ reports }}\" as=\"r\" hint-placeholder-count=\"8\">\n            <div style=\"background:#211e18;border:1px solid #2b2720;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:14px\" style-hover=\"border-color:#3a352c\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px\">\n                <span style=\"width:40px;height:40px;flex:none;border-radius:9px;background:#16140f;border:1px solid #2b2720;display:flex;align-items:center;justify-content:center\">{{ r.icon }}<\u002Fspan>\n                <div style=\"display:flex;flex-direction:column;gap:3px\">\n                  <span style=\"font-size:13.5px;font-weight:600;color:#e8e2d6\">{{ r.en }}<\u002Fspan>\n \"display:flex;align-items:center;gap:9px\">\n            <span style=\"font-family:'IBM Plex Mono';font-size:14px;color:#f97316;font-weight:600\">{{ currentWo.id }}<\u002Fspan>\n            <span style=\"font-size:10px;font-family:'IBM Plex Mono';padding:3px 9px;border-radius:6px;color:{{ currentWo.statusColor }};background:{{ currentWo.statusBg }}\">{{ currentWo.statusLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-size:15px;font-weight:600;color:#f5f1e8\">{{ currentWo.machine }}<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeWo }}\" style=\"width:32px;height:32px;border-radius:8px;border:1px solid #2b2720;background:#16140f;color:#a59f92;cursor:pointer;font-size:16px\" style-hover=\"background:#26221b\">✕<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:20px\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n          <div style=\"display:flex;flex-direction:column;gap:3px\"><span style=\"font-size:10.5px;color:#736e63\">PM Number<\u002Fspan><span style=\"font-size:12.5px;font-family:'IBM Plex Mono';color:#cabfa9\">{{ currentWo.pm }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\"><span style=\"font-size:10.5px;color:#736e63\">กำหนดเสร็จ<\u002Fspan><span style=\"font-size:12.5px;font-family:'IBM Plex Mono';color:{{ currentWo.dueColor }}\">{{ currentWo.due }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\"><span style=\"font-size:10.5px;color:#736e63\">ผู้รับผิดชอบ<\u002Fspan><span style=\"font-size:12.5px;color:#cabfa9\">{{ currentWo.assignee }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\"><span style=\"font-size:10.5px;color:#736e63\">ความสำคัญ<\u002Fspan><span style=\"font-size:12.5px;color:{{ currentWo.prioColor }}\">{{ currentWo.priority }}<\u002Fspan><\u002Fdiv>\n nt-family:'IBM Plex Mono'\">IMPORT FROM EXCEL<\u002Fspan><\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"width:32px;height:32px;border-radius:8px;border:1px solid #2b2720;background:#16140f;color:#a59f92;cursor:pointer;font-size:16px\" style-hover=\"background:#26221b\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:22px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"border:1.5px dashed #37322a;border-radius:12px;padding:34px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;background:repeating-linear-gradient(45deg,#1e1b16,#1e1b16 8px,#211e18 8px,#211e18 16px);cursor:pointer\" style-hover=\"border-color:#f97316\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f97316\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5-5 5 5\"><\u002Fpath><path d=\"M12 5v12\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:13px;color:#cabfa9\">ลากไฟล์ Excel มาวาง หรือ คลิกเพื่อเลือก<\u002Fspan>\n          <span style=\"font-size:11px;color:#5c5648;font-family:'IBM Plex Mono'\">.xlsx, .xls · สูงสุด 10MB<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;color:#f97316;cursor:pointer\"><span>⤓<\u002Fspan><span>ดาวน์โหลดเทมเพลตมาตรฐาน (Template.xlsx)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:16px 22px;border-top:1px solid #2b2720;display:flex;gap:10px;justify-content:flex-end\">\n        <button onclick=\"{{ closeModal }}\" style=\"padding:10px 18px;border-radius:9px;border:1px solid #2b2720;background:#16140f;color:#cabfa9;font-size:13px;font-family:'IBM Plex Sans Thai';cursor:pointer\" style-hover=\"background:#26221b\">ยกเลิก<\u002Fbutton>\n        <button onclick=\"{{ importDo }}\" style=\"padding:10px 22px;border-radius:9px;border:none;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-size:13px;font-weight:600;font-family:'IBM Plex Sans Thai';cursor:pointer\" style-hover=\"filter:brightness(1.08)\">นำเข้าข้อมูล<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DELETE CONFIRM MODAL ============ -->\n  <sc-if value=\"{{ isDelModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ cancelDelete }}\" style=\"position:fixed;inset:0;background:rgba(10,9,6,.62);backdrop-filter:blur(2px);z-index:80\"><\u002Fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;max-width:92vw;background:#1b1813;border:1px solid #2b2720;border-radius:14px;z-index:85;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:24px 24px 20px\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center\">\n        <span style=\"width:52px;height:52px;border-radius:50%;background:#ef444418;border:1px solid #ef444455;display:flex;align-items:center;justify-content:center\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f87171\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18\"><\u002Fpath><path d=\"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><path d=\"M10 11v6M14 11v6\"><\u002Fpath><path d=\"M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:5px\">\n          <span style=\"font-size:15.5px;font-weight:600;color:#f5f1e8\">ยืนยันการลบเครื่องจักร?<\u002Fspan>\n          <span style=\"font-size:12.5px;color:#a59f92;line-height:1.5\">ต้องการลบ <span style=\"color:#f97316;font-family:'IBM Plex Mono'\">{{ delTarget.code }}<\u002Fspan> · {{ delTarget.name }}<br>การกระทำนี้ไม่สามารถย้อนกลับได้<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:20px\">\n        <button onclick=\"{{ cancelDelete }}\" style=\"flex:1;padding:11px;border-radius:9px;border:1px solid #2b2720;background:#16140f;color:#cabfa9;font-size:13px;font-family:'IBM Plex Sans Thai';cursor:pointer\" style-hover=\"background:#26221b\">ยกเลิก<\u002Fbutton>\n        <button onclick=\"{{ confirmDelete }}\" style=\"flex:1;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:13px;font-weight:600;font-family:'IBM Plex Sans Thai';cursor:pointer\" style-hover=\"filter:brightness(1.08)\">ลบเครื่องจักร<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOAST ============ -->\n  <sc-if value=\"{{ toastShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:11px;background:#211e18;border:1px solid #37322a;border-left:3px solid #22c55e;border-radius:10px;padding:13px 18px;box-shadow:0 12px 40px rgba(0,0,0,.5)\">\n      <span style=\"width:22px;height:22px;flex:none;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">✓<\u002Fspan>\n      <span style=\"font-size:13px;color:#e8e2d6\">{{ toast }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  PERSIST_KEYS=['extraMachines','extraPlans','deletedMachines','planOverrides','dispatched','photos','comments','checks'];\n\n  thMon={'ม.ค.':0,'ก.พ.':1,'มี.ค.':2,'เม.ย.':3,'พ.ค.':4,'มิ.ย.':5,'ก.ค.':6,'ส.ค.':7,'ก.ย.':8,'ต.ค.':9,'พ.ย.':10,'ธ.ค.':11};\n  thMonShort=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\n\n  parseDue(str){\n    if(!str||str==='-') return null;\n    if(/^\\d{4}-\\d{2}-\\d{2}/.test(str)){ const p=str.slice(0,10).split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }\n    const parts=str.trim().split(/\\s+/);\n    if(parts.length>=3){ const d=parseInt(parts[0]); const m=this.thMon[parts[1]]; let y=parseInt(parts[2]); if(y>2400)y-=543; if(!isNaN(d)&&m!=null&&!isNaN(y)) return new Date(y,m,d); }\n    return null;\n  }\n  daysUntil(str){ const due=this.parseDue(str); if(!due)return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((due-t)/86400000); }\n  fmtThai(d){ if(!d)return '-'; return d.getDate()+' '+this.thMonShort[d.getMonth()]+' '+(d.getFullYear()+543); }\n\n  openEditPlan(p){\n    const due=this.parseDue(p.due);\n    const iso=due?(due.getFullYear()+'-'+String(due.getMonth()+1).padStart(2,'0')+'-'+String(due.getDate()).padStart(2,'0')):'';\n    this.setState({modal:'pm',editingPlan:p.no,form:{pmNo:p.no,pmMachine:p.machine,pmDept:p.dept,pmFreq:p.freq,pmStart:iso,pmPrio:p.priority,pmOwner:p.owner,pmDesc:p.desc}});\n  }\n  clonePlan(p){\n    const newNo=p.no+'-C'+Math.floor(Math.random()*90+10);\n    const raw=[newNo,p.machine+' (สำเนา)',p.dept,p.freq,p.due,p.priority,0,p.owner,false,p.desc];\n    this.setState(st=>({extraPlans:[raw,...st.extraPlans]}));\n    this.toastMsg('คัดลอกแผนเป็น '+newNo+' แล้ว');\n  }\n  togglePause(no){\n    this.setState(st=>{const ov={...st.planOverrides};const cur={...(ov[no]||{})};cur.paused=!cur.paused;ov[no]=cur;return{planOverrides:ov};},()=>{\n      const paused=(this.state.planOverrides[no]||{}).paused;\n      this.toastMsg(paused?('พักแผน '+no+' แล้ว · หยุดส่งใบสั่งงาน'):('เปิดใช้แผน '+no+' แล้ว'));\n    });\n  }\n\n  state = (()=>{\n    const base = { screen:'dashboard', q:'', cal:{y:2026,m:5}, openWo:null, checks:{}, modal:null, form:{}, toast:null, extraMachines:[], extraPlans:[], deletedMachines:[], planOverrides:{}, dispatched:{}, editingPlan:null, photos:{}, comments:{}, commentDraft:'', delTarget:null };\n    try{ const saved=JSON.parse(localStorage.getItem('pmsys_v1')||'{}'); Object.assign(base, saved); }catch(e){}\n    return base;\n  })();\n\n  componentDidUpdate(){\n    try{\n      const out={}; this.PERSIST_KEYS.forEach(k=>{ out[k]=this.state[k]; });\n      localStorage.setItem('pmsys_v1', JSON.stringify(out));\n    }catch(e){}\n  }\n\n  icon(children){\n    return React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.7,strokeLinecap:'round',strokeLinejoin:'round'},children);\n  }\n  p(d,k){ return React.createElement('path',{d:d,key:k||d}); }\n  r(x,y,w,h,k){ return React.createElement('rect',{x:x,y:y,width:w,height:h,rx:1.7,key:k||(''+x+y)}); }\n\n  toastMsg(msg){ this.setState({toast:msg}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}),2600); }\n\n  nowLabel(){ const d=new Date(); const hh=(''+d.getHours()).padStart(2,'0'); const mm=(''+d.getMinutes()).padStart(2,'0'); return 'วันนี้ '+hh+':'+mm+' น.'; }\n\n  navIcon(key){\n    if(key==='dashboard') return this.icon([this.r(3,3,7,7,'a'),this.r(14,3,7,7,'b'),this.r(14,14,7,7,'c'),this.r(3,14,7,7,'d')]);\n    if(key==='machines') return this.icon([this.p('M12 2.5 L20.5 7 V17 L12 21.5 L3.5 17 V7 Z','a'),this.p('M3.5 7 L12 11.5 L20.5 7','b'),this.p('M12 11.5 V21.5','c')]);\n    if(key==='plans') return this.icon([React.createElement('rect',{x:5,y:4,width:14,height:17,rx:2,key:'r'}),this.p('M9 4 H15 V6.5 H9 Z','t'),this.p('M8.5 10 H15.5','a'),this.p('M8.5 14 H15.5','b'),this.p('M8.5 18 H13','c')]);\n    if(key==='workorders') return this.icon([this.p('M6 3 H14 L19 8 V21 H6 Z','a'),this.p('M14 3 V8 H19','b'),this.p('M8.5 14 l2 2 l4 -4','c')]);\n    if(key==='calendar') return this.icon([React.createElement('rect',{x:3,y:5,width:18,height:16,rx:2,key:'r'}),this.p('M3 9.5 H21','a'),this.p('M8 3 V6','b'),this.p('M16 3 V6','c')]);\n    if(key==='reports') return this.icon([this.p('M4 20 V11','a'),this.p('M10 20 V4','b'),this.p('M16 20 V14','c'),this.p('M3 20.5 H21','d')]);\n    return null;\n  }\n\n  machineMeta(){\n    const c={Running:'#22c55e',Maintenance:'#f59e0b',Stopped:'#ef4444',Standby:'#3b82f6'};\n    return [\n
